kind = "web"
previewPath = "/"
title = "Tax Deliver Letterhead"
version = "1.0.0"
id = "artifacts/letterhead"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23055

[services.development]
run = "pnpm --filter @workspace/letterhead run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/letterhead", "run", "build" ]
publicDir = "artifacts/letterhead/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23055"
BASE_PATH = "/"
